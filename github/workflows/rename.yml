name: Package Rename (run once)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create new package directory structure
        run: |
          mkdir -p app/src/main/java/com/rkd/audiobasics/api/cipher
          mkdir -p app/src/main/java/com/rkd/audiobasics/api/potoken
          mkdir -p app/src/main/java/com/rkd/audiobasics/cache
          mkdir -p app/src/main/java/com/rkd/audiobasics/data
          mkdir -p app/src/main/java/com/rkd/audiobasics/lyrics
          mkdir -p app/src/main/java/com/rkd/audiobasics/player
          mkdir -p app/src/main/java/com/rkd/audiobasics/ui/theme
          mkdir -p app/src/main/java/com/rkd/audiobasics/utils

      - name: Copy files to new package path
        run: |
          cp -r app/src/main/java/com/yt/lite/. app/src/main/java/com/rkd/audiobasics/

      - name: Replace package references in all Kotlin files
        run: |
          find app/src/main/java/com/rkd/audiobasics -name "*.kt" | \
            xargs sed -i 's/com\.yt\.lite/com.rkd.audiobasics/g'

      - name: Update build.gradle namespace and applicationId
        run: |
          sed -i "s/namespace 'com\.yt\.lite'/namespace 'com.rkd.audiobasics'/" app/build.gradle
          sed -i "s/applicationId 'com\.yt\.lite'/applicationId 'com.rkd.audiobasics'/" app/build.gradle

      - name: Update settings.gradle project name
        run: |
          sed -i "s/rootProject\.name = \"YTLite\"/rootProject.name = \"Audiobasics\"/" settings.gradle

      - name: Delete old package directory
        run: |
          rm -rf app/src/main/java/com/yt

      - name: Commit rename
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: rename package com.yt.lite → com.rkd.audiobasics"
          git push
